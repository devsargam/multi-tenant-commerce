services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scalable_commerce
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: scalable-commerce-api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      PORT: 3001
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/scalable_commerce
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"

  web:
    image: scalable-commerce-web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      api:
        condition: service_started
    ports:
      - "3000:3000"

  admin-web:
    image: scalable-commerce-admin-web
    build:
      context: .
      dockerfile: apps/admin-web/Dockerfile
      args:
        VITE_API_URL: http://localhost:3001
    depends_on:
      api:
        condition: service_started
    ports:
      - "3002:3002"

  k8s-orchestrator-api:
    image: scalable-commerce-k8s-orchestrator-api
    build:
      context: .
      dockerfile: apps/k8s-orchestrator-api/Dockerfile
    environment:
      PORT: 3010
      K8S_APPLY_MODE: ${K8S_APPLY_MODE:-dry-run}
      KUBECONFIG: /kube/config
      NAMESPACE_PREFIX: ${NAMESPACE_PREFIX:-sc}
      DEFAULT_IMAGE_REGISTRY: ${DEFAULT_IMAGE_REGISTRY:-ghcr.io/devsargam/multi-tenant-commerce}
      DEFAULT_API_IMAGE: ${DEFAULT_API_IMAGE:-ghcr.io/devsargam/multi-tenant-commerce-api:latest}
      DEFAULT_WEB_IMAGE: ${DEFAULT_WEB_IMAGE:-ghcr.io/devsargam/multi-tenant-commerce-web:latest}
      DEFAULT_ADMIN_WEB_IMAGE: ${DEFAULT_ADMIN_WEB_IMAGE:-ghcr.io/devsargam/multi-tenant-commerce-admin-web:latest}
      LOCAL_ACCESS_PORT_BASE: ${LOCAL_ACCESS_PORT_BASE:-3100}
    volumes:
      - ${KUBECONFIG:-/Users/sargampoudel/.kube/config}:/kube/config:ro
    ports:
      - "3010:3010"

  provision-web:
    image: scalable-commerce-provision-web
    build:
      context: .
      dockerfile: apps/provision-web/Dockerfile
      args:
        VITE_ORCHESTRATOR_API_URL: http://localhost:3010
    depends_on:
      k8s-orchestrator-api:
        condition: service_started
    ports:
      - "3003:3003"

volumes:
  postgres-data:

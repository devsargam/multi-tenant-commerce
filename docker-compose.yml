services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scalable_commerce
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: scalable-commerce-api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      PORT: 3001
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/scalable_commerce
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"

  web:
    image: scalable-commerce-web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      api:
        condition: service_started
    ports:
      - "3000:3000"

  admin-web:
    image: scalable-commerce-admin-web
    build:
      context: .
      dockerfile: apps/admin-web/Dockerfile
      args:
        VITE_API_URL: http://localhost:3001
    depends_on:
      api:
        condition: service_started
    ports:
      - "3002:3002"

volumes:
  postgres-data:
